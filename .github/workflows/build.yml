name: CI/CD

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'          # 忽略README.md
      - 'docs/**'        # 忽略整个 docs 文档文件夹（如果有的话）
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  android:
    name: Android Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Run Tests
        run: ./gradlew :shared:jvmTest :androidApp:testDebugUnitTest

      - name: Decode Keystore
        if: github.event_name != 'pull_request'
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          mkdir -p key
          echo "$SIGNING_KEY" | base64 --decode > key/kaixuan.jks

      - name: Create local.properties
        if: github.event_name != 'pull_request'
        run: |
          echo "SIGNING_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "SIGNING_KEY_PASSWORD=${{ secrets.SIGNING_KEY_PASSWORD }}" >> local.properties
          echo "SIGNING_STORE_PASSWORD=${{ secrets.SIGNING_STORE_PASSWORD }}" >> local.properties
          echo "OPENAI_API_HOST=https://api.openai.com/v1" >> local.properties
          echo "OPENAI_API_KEY=" >> local.properties

      - name: Build Android Release
        if: github.event_name != 'pull_request'
        run: ./gradlew :androidApp:assembleRelease :androidApp:bundleRelease

      - name: Build Android Debug (for PRs)
        if: github.event_name == 'pull_request'
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: androidApp/build/outputs/apk/release/*.apk
        if: github.event_name != 'pull_request'

      - name: Upload Release Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-release-bundle
          path: androidApp/build/outputs/bundle/release/*.aab
        if: github.event_name != 'pull_request'

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
        if: github.event_name == 'pull_request'

  desktop-windows:
    name: Desktop Windows Build
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Add WiX to PATH
        run: echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" >> $env:GITHUB_PATH

      - name: Build MSI
        run: ./gradlew :desktopApp:packageMsi

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-msi
          path: desktopApp/build/compose/binaries/main/msi/*.msi
